<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — ÉTO GIOIELLI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header header--solid" id="header">
    <div class="container">
      <a href="index.html" class="header__logo">
        <img src="assets/logo.svg" alt="ÉTO GIOIELLI" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span style="display:none">ÉTO GIOIELLI</span>
      </a>
      <nav class="nav">
        <a href="index.html" data-i18n="nav_home">Главная</a>
        <a href="about.html" data-i18n="nav_about">О бренде</a>
        <a href="catalog.html" data-i18n="nav_catalog">Каталог</a>
        <a href="contact.html" data-i18n="nav_contacts">Контакты</a>
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </nav>
      <button class="burger" id="burger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-nav" id="mobileNav">
      <a href="index.html" data-i18n="nav_home">Главная</a>
      <a href="about.html" data-i18n="nav_about">О бренде</a>
      <a href="catalog.html" data-i18n="nav_catalog">Каталог</a>
      <a href="contact.html" data-i18n="nav_contacts">Контакты</a>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </nav>
  </header>

  <main style="padding-top: calc(var(--header-h) + 60px); padding-bottom: 80px; min-height: 70vh;">
    <div class="container">
      <div class="section-title">
        <h1 data-i18n="contact_title">Связаться с нами</h1>
      </div>
      <div class="contact-block" style="background: none; padding: 0;">
        <div class="container" style="padding: 0;">
          <p class="contact-info" id="contactInfo"></p>
          <div class="contact-buttons" id="contactButtons"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__brand">ÉTO GIOIELLI</span>
        <div class="footer__links">
          <a href="catalog.html" data-i18n="nav_catalog">Каталог</a>
          <a href="about.html" data-i18n="nav_about">О бренде</a>
        </div>
        <span class="footer__rights" data-i18n="footer_rights">© 2024 ÉTO GIOIELLI. Все права защищены.</span>
      </div>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    document.getElementById('burger').addEventListener('click', () =>
      document.getElementById('mobileNav').classList.toggle('open'));
    document.getElementById('contactInfo').innerHTML =
      `${CONFIG.contact.city} &nbsp;·&nbsp; <a href="tel:${CONFIG.contact.phone.replace(/\s/g,'')}">${CONFIG.contact.phone}</a>`;
    document.getElementById('contactButtons').innerHTML = `
      <a href="https://wa.me/${CONFIG.contact.whatsapp.replace(/\D/g,'')}" class="btn btn--whatsapp" target="_blank" data-i18n="btn_whatsapp">WhatsApp</a>
      <a href="https://t.me/${CONFIG.contact.telegram.replace('@','')}" class="btn btn--telegram" target="_blank" data-i18n="btn_telegram">Telegram</a>
    `;
    applyTranslations(getLang());
  </script>
</body>
</html>
